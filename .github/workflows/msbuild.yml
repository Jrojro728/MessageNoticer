# separate terms of service, privacy policy, and support
# documentation.

name: MSBuild

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Path to the solution file relative to the root of the project.
  SOLUTION_FILE_PATH: .

  # Configuration type to build.
  # You can convert this to a build matrix if you need coverage of multiple configuration types.
  # https://docs.github.com/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
  BUILD_CONFIGURATION: Release

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6.0.2
    - uses: lukka/get-cmake@v4.3.3
    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v3

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11.6
      id: runvcpkg
      with:
        vcpkgDirectory: '${{ github.workspace }}/vcpkg'
        vcpkgGitCommitId: 'aa40adda5352e87655b8583cfb2451d5e9e276fd'
        # Run vcpkg with the command specified by the `runVcpkgFormatString` input.
        runVcpkgInstall: true
        vcpkgJsonGlob: '**/vcpkg.json'

    - name: vcpkg integrate install
      run: vcpkg integrate install

    - name: Restore NuGet packages
      working-directory: ${{ github.workspace }}
      run: nuget restore ${{ github.workspace }}

    - name: Build
      working-directory: ${{ github.workspace }}
      # Add additional options to the MSBuild command line here (like platform or verbosity level).
      # See https://docs.microsoft.com/visualstudio/msbuild/msbuild-command-line-reference
      run: msbuild /m /p:Configuration=${{env.BUILD_CONFIGURATION}} ${{env.SOLUTION_FILE_PATH}}
